<svg viewBox="0 0 1000 580" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1F3864"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#1F3864">Projeto HAND — Arquitetura analítica de custo de frota</text>
  <text x="500" y="56" text-anchor="middle" font-size="13" fill="#5A6B85">Dado operacional cru → decisão de eficiência com cifra</text>

  <!-- Section labels -->
  <text x="122" y="82" text-anchor="middle" font-size="11" font-weight="700" fill="#8A97AE" letter-spacing="1">FONTES OPERACIONAIS</text>
  <text x="600" y="180" text-anchor="middle" font-size="11" font-weight="700" fill="#8A97AE" letter-spacing="1">PIPELINE ANALÍTICO</text>

  <!-- Source boxes -->
  <g>
    <rect x="24" y="96" width="196" height="58" rx="8" fill="#EAF1FB" stroke="#1F3864" stroke-width="1.5"/>
    <text x="122" y="120" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1F3864">Telemetria / Rastreamento</text>
    <text x="122" y="138" text-anchor="middle" font-size="12.5" fill="#1F3864">(API GPS)</text>

    <rect x="24" y="166" width="196" height="58" rx="8" fill="#EAF1FB" stroke="#1F3864" stroke-width="1.5"/>
    <text x="122" y="190" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1F3864">Abastecimento</text>
    <text x="122" y="208" text-anchor="middle" font-size="12.5" fill="#1F3864">(combustível, pneus)</text>

    <rect x="24" y="236" width="196" height="58" rx="8" fill="#EAF1FB" stroke="#1F3864" stroke-width="1.5"/>
    <text x="122" y="270" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1F3864">Pedágios</text>

    <rect x="24" y="306" width="196" height="58" rx="8" fill="#EAF1FB" stroke="#1F3864" stroke-width="1.5"/>
    <text x="122" y="340" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1F3864">Rotas planejadas</text>
  </g>

  <!-- Converging connectors -->
  <g stroke="#6E86B5" stroke-width="1.5" fill="none">
    <path d="M220,125 C265,125 270,245 300,245"/>
    <path d="M220,195 C265,195 272,245 300,245"/>
    <path d="M220,265 C265,265 272,245 300,245"/>
    <path d="M220,335 C265,335 270,245 300,245"/>
  </g>

  <!-- Pipeline boxes -->
  <g>
    <rect x="300" y="197" width="170" height="96" rx="8" fill="#1F3864"/>
    <text x="385" y="232" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Ingestão &amp; ETL</text>
    <text x="385" y="252" text-anchor="middle" font-size="11.5" fill="#CBD8EE">limpeza, padronização</text>
    <text x="385" y="270" text-anchor="middle" font-size="11.5" fill="#CBD8EE">chave comum por</text>
    <text x="385" y="286" text-anchor="middle" font-size="11.5" fill="#CBD8EE">caminhão / rota / data</text>

    <rect x="510" y="197" width="170" height="96" rx="8" fill="#1F3864"/>
    <text x="595" y="238" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Modelo Power BI</text>
    <text x="595" y="258" text-anchor="middle" font-size="11.5" fill="#CBD8EE">Star Schema</text>
    <text x="595" y="276" text-anchor="middle" font-size="11.5" fill="#CBD8EE">KPIs de custo</text>

    <rect x="720" y="197" width="180" height="96" rx="8" fill="#1F3864"/>
    <text x="810" y="232" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Dashboards &amp; KPIs</text>
    <text x="810" y="252" text-anchor="middle" font-size="11.5" fill="#CBD8EE">custo por caminhão,</text>
    <text x="810" y="270" text-anchor="middle" font-size="11.5" fill="#CBD8EE">rota e período →</text>
    <text x="810" y="286" text-anchor="middle" font-size="11.5" fill="#CBD8EE">reunião de resultado</text>
  </g>

  <!-- Pipeline arrows -->
  <g stroke="#1F3864" stroke-width="2.5" marker-end="url(#arrow)">
    <line x1="472" y1="245" x2="506" y2="245"/>
    <line x1="682" y1="245" x2="716" y2="245"/>
  </g>

  <!-- Results -->
  <text x="500" y="392" text-anchor="middle" font-size="12" font-weight="700" fill="#1B5E20" letter-spacing="1">RESULTADOS DE NEGÓCIO</text>
  <g>
    <rect x="24" y="404" width="300" height="66" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
    <text x="174" y="432" text-anchor="middle" font-size="14" font-weight="700" fill="#1B5E20">Combustível</text>
    <text x="174" y="453" text-anchor="middle" font-size="14" font-weight="700" fill="#1B5E20">−6% por mês</text>

    <rect x="350" y="404" width="300" height="66" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
    <text x="500" y="430" text-anchor="middle" font-size="13" font-weight="700" fill="#1B5E20">Pedágio: R$ 60 mil/mês mapeado</text>
    <text x="500" y="452" text-anchor="middle" font-size="12.5" fill="#1B5E20">→ novo modelo de controle</text>

    <rect x="676" y="404" width="300" height="66" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
    <text x="826" y="430" text-anchor="middle" font-size="13" font-weight="700" fill="#1B5E20">Desvios de rota detectados</text>
    <text x="826" y="452" text-anchor="middle" font-size="12.5" fill="#1B5E20">(GPS × rota planejada)</text>
  </g>

  <!-- Footer tagline -->
  <text x="500" y="508" text-anchor="middle" font-size="14" font-style="italic" fill="#1F3864">"Planejado × Realizado — é no desvio entre os dois que o custo aparece."</text>
  <text x="976" y="554" text-anchor="end" font-size="10.5" fill="#9AA6BB">Diagrama sanitizado — sem dados do cliente</text>
</svg>
